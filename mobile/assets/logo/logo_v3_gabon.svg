<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Gabon flag stripes as background -->
  <rect x="0" y="0" width="512" height="170" fill="#009E60"/>
  <rect x="0" y="170" width="512" height="172" fill="#FCD116"/>
  <rect x="0" y="342" width="512" height="170" fill="#3A75C4"/>
  <!-- Rounded mask -->
  <defs>
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>
  <!-- Central white circle with monogram -->
  <g clip-path="url(#roundedClip)">
    <rect x="0" y="0" width="512" height="170" fill="#009E60"/>
    <rect x="0" y="170" width="512" height="172" fill="#FCD116"/>
    <rect x="0" y="342" width="512" height="170" fill="#3A75C4"/>
    <circle cx="256" cy="256" r="140" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="4"/>
    <text x="256" y="300"
          font-family="Helvetica Neue, Arial, sans-serif"
          font-size="140"
          font-weight="800"
          fill="#1A1A1A"
          text-anchor="middle"
          letter-spacing="-6">GP</text>
    <!-- Flight path dots -->
    <circle cx="160" cy="360" r="8" fill="#D4A017"/>
    <path d="M 172 358 Q 256 330 340 358" stroke="#D4A017" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="4 6"/>
    <circle cx="352" cy="360" r="8" fill="#D4A017"/>
  </g>
</svg>
