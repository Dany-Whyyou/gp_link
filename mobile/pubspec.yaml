name: gp_link
description: GP Link - Marketplace connecting travelers and senders (Gabon)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.3.4
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  intl: ^0.20.2
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  url_launcher: ^6.2.5
  shared_preferences: ^2.2.3
  onesignal_flutter: ^5.1.6
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  timeago: ^3.6.1
  uuid: ^4.3.3
  http: ^1.2.1
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  flutter_dotenv: ^5.1.0
  gap: ^3.0.1
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  freezed: ^2.4.7
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/logo/icon_1024.png"
  adaptive_icon_background: "assets/logo/icon_background.png"
  adaptive_icon_foreground: "assets/logo/icon_foreground.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter_native_splash:
  color: "#0A2540"
  image: assets/logo/icon_foreground.png
  android_12:
    color: "#0A2540"
    image: assets/logo/icon_foreground.png
    icon_background_color: "#0A2540"
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logo/
    - .env
